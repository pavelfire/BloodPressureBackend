services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bp
      POSTGRES_PASSWORD: bp
      POSTGRES_DB: bloodpressure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bp -d bloodpressure"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://bp:bp@postgres:5432/bloodpressure?sslmode=disable
      JWT_SECRET: dev-secret-change-in-prod
      PORT: "8080"
      CORS_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
